spring.application.name=ms-notification
server.port=8085
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:8094}/${DB_NAME:notification}
spring.datasource.username=${DB_USER:notification}
spring.datasource.password=${DB_PASSWORD:notification}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
