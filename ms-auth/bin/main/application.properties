spring.application.name=ms-auth
server.port=8081
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:8090}/${DB_NAME:auth}
spring.datasource.username=${DB_USER:auth}
spring.datasource.password=${DB_PASSWORD:auth}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
jwt.secret=${JWT_SECRET:ferreteria-secret-key-super-segura-2024-minimo-32-chars}
jwt.expiration=${JWT_EXPIRATION:3600000}
